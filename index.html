
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princess Akinogun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'charcoal': '#1A1A1A',
              'terracotta': '#C16E5D',
              'sage': '#8A9A5B',
              'paper-cream': '#FDFCF8',
              'brown': '#6B4423',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --paper-cream: #FDFCF8;
        --charcoal: #1A1A1A;
        --terracotta: #C16E5D;
        --sage: #8A9A5B;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--paper-cream);
        color: var(--charcoal);
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .font-journal {
        font-family: 'Cormorant Garamond', serif;
      }
      /* Root visibility check */
      #root {
        min-height: 100vh;
        display: block;
      }
      /* Premium Paper Texture */
      .bg-paper-texture {
        position: relative;
      }
      .bg-paper-texture::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.05;
        z-index: 50;
        background-image: url("https://www.transparenttextures.com/patterns/felt-paper.png");
      }
      /* Grain overlay for depth */
      .grain {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.1;
        pointer-events: none;
        z-index: 51;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      }
      /* Custom thin scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--paper-cream);
      }
      ::-webkit-scrollbar-thumb {
        background: #dcdcdc;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--terracotta);
      }
      /* Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-reveal {
        animation: fadeInUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-paper-texture overflow-x-hidden">
    <div class="grain"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
